version: '3.8'

services:
  # Neo4j Graph Database
  neo4j:
    image: neo4j:5.16.0
    container_name: audit-neo4j
    ports:
      - "7474:7474"  # Browser
      - "7687:7687"  # Bolt protocol
    environment:
      NEO4J_AUTH: neo4j/audit_password_2024
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_dbms_memory_transaction_total_max: 0
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/import
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - audit-network

  # Chroma Vector Database
  chroma:
    image: chromadb/chroma:0.4.22
    container_name: audit-chroma
    ports:
      - "8000:8000"
    environment:
      - CHROMA_DB_IMPL=chromadb.db.impl.sqlite
      - PERSIST_DIRECTORY=/chroma/chroma
    volumes:
      - chroma_data:/chroma/chroma
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/heartbeat"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - audit-network

networks:
  audit-network:
    driver: bridge

volumes:
  neo4j_data:
    driver: local
  neo4j_logs:
    driver: local
  neo4j_import:
    driver: local
  chroma_data:
    driver: local
